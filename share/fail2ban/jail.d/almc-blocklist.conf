# ALMC Abuse Shield — dedicated jail for IPs distributed by the central server.
# Filter is a no-op; IPs are added/removed via fail2ban-client (by almc-shield agent).
# Configured but agent uses banip directly in F4.
[almc-blocklist]
enabled  = true
filter   = almc-blocklist
backend  = polling
findtime = 1
maxretry = 1
bantime  = 604800
banaction = %(banaction_allports)s
logpath  = /dev/null
