# ALMC Abuse Shield — dedicated jail for IPs distributed by the central server.
# Filter is a no-op; IPs are added/removed via `fail2ban-client banip|unbanip`
# called by the almc-shield agent (no log scanning needed for this jail).
[almc-blocklist]
enabled  = true
filter   = almc-blocklist
backend  = polling
findtime = 1
maxretry = 1
bantime  = 604800
banaction = %(banaction_allports)s
logpath  = /dev/null
